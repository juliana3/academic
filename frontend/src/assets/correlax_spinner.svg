<svg width="120" height="120" viewBox="100 60 260 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .nodo { opacity: 0; animation: aparecer 0.4s ease forwards; }
      .linea { opacity: 0; stroke-dasharray: 80; stroke-dashoffset: 80; animation: trazar 0.4s ease forwards; }
      .n1 { animation-delay: 0s; }
      .n2 { animation-delay: 0.2s; }
      .n3 { animation-delay: 0.4s; }
      .n4 { animation-delay: 0.6s; }
      .n5 { animation-delay: 0.8s; }
      .n6 { animation-delay: 1.0s; }
      .n7 { animation-delay: 1.2s; }
      .n8 { animation-delay: 1.4s; }
      .l1 { animation-delay: 0.1s; }
      .l2 { animation-delay: 0.3s; }
      .l3 { animation-delay: 0.5s; }
      .l4 { animation-delay: 0.7s; }
      .l5 { animation-delay: 0.9s; }
      .l6 { animation-delay: 1.1s; }
      .l7 { animation-delay: 1.3s; }
      @keyframes aparecer {
        from { opacity: 0; transform-box: fill-box; transform-origin: center; transform: scale(0.2); }
        to { opacity: 1; transform-box: fill-box; transform-origin: center; transform: scale(1); }
      }
      @keyframes trazar {
        from { stroke-dashoffset: 80; opacity: 0; }
        to { stroke-dashoffset: 0; opacity: 1; }
      }
      .pulse {
        animation: aparecer 0.4s ease forwards 0.6s, pulse 1.8s ease-in-out infinite 1.2s;
        opacity: 0;
        transform-box: fill-box;
        transform-origin: center;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.2); opacity: 0.7; }
      }
    </style>
  </defs>

  <circle class="nodo n1" cx="140" cy="180" r="6" fill="#7dd3fc" opacity="0.6"/>
  <circle class="nodo n2" cx="170" cy="120" r="8" fill="#7dd3fc" opacity="0.75"/>
  <circle class="nodo n3" cx="215" cy="80" r="6" fill="#7dd3fc" opacity="0.6"/>
  <circle class="nodo n4" cx="200" cy="160" r="7" fill="#38bdf8"/>
  <circle class="pulse" cx="255" cy="130" r="10" fill="#0ea5e9"/>
  <circle class="nodo n6" cx="310" cy="100" r="7" fill="#7dd3fc" opacity="0.8"/>
  <circle class="nodo n7" cx="300" cy="170" r="6" fill="#38bdf8" opacity="0.7"/>
  <circle class="nodo n8" cx="255" cy="195" r="5" fill="#7dd3fc" opacity="0.5"/>

  <line class="linea l1" x1="146" y1="175" x2="164" y2="127" stroke="#7dd3fc" stroke-width="1.2" fill="none" marker-end="url(#arrow)" opacity="0.6"/>
  <line class="linea l2" x1="176" y1="115" x2="211" y2="85" stroke="#38bdf8" stroke-width="1.2" fill="none" marker-end="url(#arrow)" opacity="0.65"/>
  <line class="linea l3" x1="207" y1="154" x2="246" y2="136" stroke="#0ea5e9" stroke-width="1.4" fill="none" marker-end="url(#arrow)" opacity="0.8"/>
  <line class="linea l4" x1="264" y1="125" x2="304" y2="104" stroke="#38bdf8" stroke-width="1.2" fill="none" marker-end="url(#arrow)" opacity="0.7"/>
  <line class="linea l5" x1="262" y1="135" x2="298" y2="165" stroke="#7dd3fc" stroke-width="1" fill="none" marker-end="url(#arrow)" opacity="0.5"/>
  <line class="linea l6" x1="175" y1="125" x2="197" y2="157" stroke="#7dd3fc" stroke-width="0.8" fill="none" marker-end="url(#arrow)" opacity="0.4"/>
  <line class="linea l7" x1="258" y1="190" x2="296" y2="173" stroke="#7dd3fc" stroke-width="0.8" fill="none" marker-end="url(#arrow)" opacity="0.4"/>
</svg>
